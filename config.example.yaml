# ─── Aperture — example configuration ────────────────────────────────────────
#
# Copy this file to config.yaml and fill in your own services.
#
#   cp config.example.yaml config.yaml
#
# Every option is documented inline below.
# ─────────────────────────────────────────────────────────────────────────────

# Label shown in the dashboard header.
title: "My Dashboard"

# Port the backend API server listens on.
port: 8888

# How often (in seconds) the backend re-runs all health checks.
check_interval: 30

# Path to the Docker daemon socket. Override if using a non-default location.
docker_socket: "/var/run/docker.sock"

# Allowed CORS origins. Defaults to ["*"] (any origin, suitable for self-hosted).
# cors_origins:
#   - "https://dashboard.example.com"

# ─── Environment variable overrides ──────────────────────────────────────────
#
# These env vars override the YAML values above:
#   APERTURE_PORT            → port
#   APERTURE_CHECK_INTERVAL  → check_interval
#   APERTURE_TITLE           → title

# ─── Services ─────────────────────────────────────────────────────────────────
#
# Each entry is either an HTTP check or a Docker socket check.
#
# Shared fields:
#   name      Display name shown on the widget card.
#   type      "http" or "docker"
#   category  Optional group label shown in the card footer.
#   href      URL to open when the card is clicked. Use this to point to the
#             externally reachable UI (e.g. http://your-server:9000) rather
#             than the internal localhost health-check address. If omitted,
#             HTTP services fall back to opening their health-check url.
#   size      Grid column span — s (1/3), m (2/3), l (full-width).
#             Defaults to s if omitted.
#
# HTTP-specific fields:
#   url       Full URL to GET. A 2xx response → healthy, 3xx → degraded,
#             anything else or a timeout → unhealthy.
#
# Docker-specific fields:
#   container Name or ID of the container to inspect via the Docker socket.
#             Running + healthy HEALTHCHECK → healthy
#             Running, no HEALTHCHECK      → healthy (noted in message)
#             Running + unhealthy          → unhealthy
#             Stopped / not found          → unhealthy / unknown

services:

  # ── Management ───────────────────────────────────────────────────────────────
  - name: "Portainer"
    type: http
    url: "http://localhost:9000"
    href: "https://portainer.mydomain.com"   # launch URL (card click opens this)
    category: "Management"
    size: s

  - name: "Nginx Proxy Manager"
    type: http
    url: "http://localhost:81"   # admin UI port
    href: "http://your-server:81"
    category: "Management"
    size: s

  # ── Media ─────────────────────────────────────────────────────────────────────
  - name: "Jellyfin"
    type: http
    url: "http://localhost:8096"
    href: "http://your-server:8096"
    category: "Media"
    size: s

  - name: "Plex"
    type: http
    url: "http://localhost:32400/web"
    href: "http://your-server:32400/web"
    category: "Media"
    size: s

  # ── Monitoring ────────────────────────────────────────────────────────────────
  - name: "Uptime Kuma"
    type: http
    url: "http://localhost:3001"
    href: "http://your-server:3001"
    category: "Monitoring"
    size: s

  - name: "Netdata"
    type: http
    url: "http://localhost:19999"
    href: "http://your-server:19999"
    category: "Monitoring"
    size: s

  # ── Storage ───────────────────────────────────────────────────────────────────
  - name: "Nextcloud"
    type: http
    url: "http://localhost:8080"
    href: "http://your-server:8080"
    category: "Storage"
    size: m   # ← 2/3 width example

  # ── Automation ────────────────────────────────────────────────────────────────
  - name: "Home Assistant"
    type: http
    url: "http://localhost:8123"
    href: "http://your-server:8123"
    category: "Automation"
    size: s

  - name: "n8n"
    type: http
    url: "http://localhost:5678"
    href: "http://your-server:5678"
    category: "Automation"
    size: s

  # ── Security ──────────────────────────────────────────────────────────────────
  - name: "Vaultwarden"
    type: http
    url: "http://localhost:8280"
    href: "http://your-server:8280"
    category: "Security"
    size: s

  # ── Dev ───────────────────────────────────────────────────────────────────────
  - name: "Gitea"
    type: http
    url: "http://localhost:3030"
    href: "http://your-server:3030"
    category: "Dev"
    size: s

  # ── Infrastructure — Docker socket checks ─────────────────────────────────────
  # These services have no directly accessible HTTP port, so we check their
  # container state instead. The backend must have read access to the Docker socket
  # (see docker-compose.yaml for the volume mount).
  - name: "Traefik"
    type: docker
    container: "traefik"        # must match the container name, not the image name
    href: "https://traefik.mydomain.com"    # Docker services need href to be clickable
    category: "Infra"
    size: s

  - name: "Watchtower"
    type: docker
    container: "watchtower"
    category: "Infra"
    size: s

  - name: "PostgreSQL"
    type: docker
    container: "postgres"
    category: "Database"
    size: s

# ─── Ollama widget ────────────────────────────────────────────────────────────
# Shows a live list of models pulled to your Ollama instance.
# Leave url blank (or remove this section entirely) to hide the widget.
ollama:
  url: "http://localhost:11434"

# ─── System resources widget ──────────────────────────────────────────────────
# Displays host CPU usage, RAM, and load averages. Polls every 5 seconds.
# Load average is Linux/macOS only; the widget degrades gracefully on Windows.
system:
  enabled: true
